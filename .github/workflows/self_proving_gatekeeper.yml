name: self-proving-gatekeeper

on:
  push:
  pull_request:

jobs:
  gatekeeper:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
      - name: Run gatekeeper
        run: |
          python standalone_workspace/scripts/qa_deployment_gatekeeper.py
